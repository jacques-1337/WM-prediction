<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mein Tipp · WM 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <header class="bg-blue-700 text-white">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <a href="index.html" class="flex items-center gap-2 font-extrabold">
        <span class="text-xl">🏆</span> <span class="hidden sm:inline">WM 2026 Tippspiel</span>
      </a>
      <div id="head-pool" class="text-sm text-blue-100 text-right truncate"></div>
    </div>
  </header>

  <!-- Status-/Speicherleiste -->
  <div class="sticky top-0 z-30 bg-white/95 backdrop-blur border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 py-2 flex items-center justify-between gap-3 flex-wrap">
      <div id="progress" class="text-xs text-slate-500"></div>
      <div class="flex items-center gap-2">
        <span id="save-status" class="text-xs text-slate-400"></span>
        <button id="link-btn" class="text-xs bg-slate-100 hover:bg-slate-200 rounded px-2 py-1">Pool-Link kopieren</button>
        <a href="#" id="pool-link" class="text-xs bg-slate-100 hover:bg-slate-200 rounded px-2 py-1">Rangliste</a>
      </div>
    </div>
  </div>

  <main class="flex-1 max-w-6xl mx-auto px-4 py-6 w-full">
    <div id="lock-banner" class="hidden mb-5 rounded-xl bg-amber-50 border border-amber-300 p-4 text-amber-800 text-sm"></div>
    <div id="loading" class="text-slate-500 py-12 text-center">Lade deinen Tipp …</div>
    <div id="editor"></div>
  </main>

  <footer class="text-center text-xs text-slate-400 py-6">
    Dein Tipp wird automatisch gespeichert. Melde dich mit deinem Konto an, um auf anderen Geräten zu bearbeiten.
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/bracket-core.js"></script>
  <script src="assets/js/scoring.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="assets/js/bracket-editor.js"></script>
  <script src="assets/js/bracket.js"></script>
</body>
</html>
